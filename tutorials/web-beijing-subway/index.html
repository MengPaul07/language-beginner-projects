<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地铁线路路径规划 (Subway Pathfinding)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>北京市地铁线路路径规划</h1>
    
    <div class="controls">
        <div class="status-panel">
            <div class="status-item">
                <span class="label">起点:</span>
                <span id="start-station-display" class="value">未选择</span>
            </div>
            <div class="status-item">
                <span class="label">终点:</span>
                <span id="end-station-display" class="value">未选择</span>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-run" id="btn-run">查找最短路径</button>
            <button class="btn-reset" id="btn-reset">重置选择</button>
        </div>
        
        <div class="instruction">
            点击站点以选择起点和终点
        </div>
    </div>

    <div class="workspace">
        <div id="map-container">
            <svg id="subway-map" viewBox="0 0 800 600">
                <!-- Lines and stations will be generated by JS -->
                <g id="lines-group"></g>
                <g id="connections-group"></g>
                <g id="stations-group"></g>
            </svg>
        </div>

        <aside id="route-panel">
            <div class="panel-header">
                <h2>线路细节</h2>
            </div>
            <div id="route-summary" class="route-summary">
                <p class="placeholder-text">请在地图上选择起点和终点</p>
            </div>
            <div id="route-steps" class="route-steps">
                <!-- Route details will appear here -->
            </div>
        </aside>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-circle start"></div>
            <span>起点</span>
        </div>
        <div class="legend-item">
            <div class="legend-circle end"></div>
            <span>终点</span>
        </div>
        <div class="legend-item">
            <div class="legend-line path"></div>
            <span>规划路径</span>
        </div>
        <div class="legend-item">
            <div class="legend-circle transfer"></div>
            <span>换乘站</span>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
